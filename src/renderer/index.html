<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChocoPass — Secure Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              display: ['Space Grotesk', 'Inter', 'sans-serif'],
            },
            colors: {
              // ネオンアクセント
              neon: {
                cyan: '#22d3ee',
                blue: '#38bdf8',
                violet: '#a78bfa',
                pink: '#f472b6',
              },
            },
            keyframes: {
              'glow-pulse': {
                '0%, 100%': { opacity: '0.6' },
                '50%': { opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-8px)' },
              },
              'gradient-shift': {
                '0%, 100%': { 'background-position': '0% 50%' },
                '50%': { 'background-position': '100% 50%' },
              },
              'fade-in': {
                from: { opacity: '0', transform: 'translateY(6px)' },
                to: { opacity: '1', transform: 'translateY(0)' },
              },
              'scale-in': {
                from: { opacity: '0', transform: 'scale(0.96)' },
                to: { opacity: '1', transform: 'scale(1)' },
              },
            },
            animation: {
              'glow-pulse': 'glow-pulse 4s ease-in-out infinite',
              float: 'float 6s ease-in-out infinite',
              'gradient-shift': 'gradient-shift 8s ease infinite',
              'fade-in': 'fade-in 0.3s ease-out',
              'scale-in': 'scale-in 0.2s ease-out',
            },
          },
        },
      };
    </script>
    <style>
      /* === テーマ変数（ダーク既定） === */
      :root,
      html.dark {
        color-scheme: dark;
        --bg: #05070f;
        --grid: rgba(148, 163, 184, 0.04);
        --glass-bg: rgba(15, 23, 42, 0.55);
        --glass-border: rgba(148, 163, 184, 0.12);
        --glass-strong-bg: rgba(13, 19, 34, 0.82);
        --glass-strong-border: rgba(148, 163, 184, 0.16);
        --glow-1: rgba(34, 211, 238, 0.14);
        --glow-2: rgba(167, 139, 250, 0.16);
        --glow-3: rgba(56, 189, 248, 0.1);
      }

      html.light {
        color-scheme: light;
        --bg: #eef2f9;
        --grid: rgba(71, 85, 105, 0.06);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(15, 23, 42, 0.08);
        --glass-strong-bg: rgba(255, 255, 255, 0.85);
        --glass-strong-border: rgba(15, 23, 42, 0.1);
        --glow-1: rgba(34, 211, 238, 0.18);
        --glow-2: rgba(167, 139, 250, 0.2);
        --glow-3: rgba(56, 189, 248, 0.16);
      }

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        color: #e2e8f0;
        background-color: var(--bg);
        background-image:
          radial-gradient(60rem 60rem at 12% -8%, var(--glow-1), transparent 60%),
          radial-gradient(55rem 55rem at 105% 10%, var(--glow-2), transparent 55%),
          radial-gradient(50rem 50rem at 50% 120%, var(--glow-3), transparent 60%);
        background-attachment: fixed;
        overflow: hidden;
      }

      /* うっすらグリッド */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at 50% 40%, black, transparent 90%);
      }

      /* グラスモーフィズム */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        border: 1px solid var(--glass-border);
      }

      .glass-strong {
        background: var(--glass-strong-bg);
        backdrop-filter: blur(26px) saturate(150%);
        -webkit-backdrop-filter: blur(26px) saturate(150%);
        border: 1px solid var(--glass-strong-border);
      }

      /* タイトルバーのドラッグ領域 */
      .titlebar-drag {
        -webkit-app-region: drag;
      }
      .titlebar-no-drag {
        -webkit-app-region: no-drag;
      }

      /* === ライトテーマ：ダーク前提のユーティリティを上書き === */
      html.light body {
        color: #1e293b;
      }
      html.light .text-white,
      html.light .text-slate-100 {
        color: #0f172a !important;
      }
      /* グラデーションボタン上の文字はライトでは白系にして当たりを柔らかく */
      html.light .text-slate-950 {
        color: #f8fafc !important;
      }
      html.light .text-slate-200 {
        color: #334155 !important;
      }
      /* 入力欄のプレースホルダ */
      html.light .placeholder\:text-slate-500::placeholder {
        color: #94a3b8 !important;
      }
      html.light .text-slate-300 {
        color: #334155 !important;
      }
      html.light .text-slate-400 {
        color: #475569 !important;
      }
      html.light .text-slate-500 {
        color: #64748b !important;
      }
      html.light .text-slate-600 {
        color: #94a3b8 !important;
      }
      html.light .text-cyan-300,
      html.light .text-cyan-400,
      html.light .text-cyan-200 {
        color: #0e7490 !important;
      }
      /* 半透明の白サーフェスはライトでは見えないのでスレート寄りに */
      html.light .bg-white\/5,
      html.light .bg-white\/\[0\.02\],
      html.light .bg-white\/\[0\.03\] {
        background-color: rgba(15, 23, 42, 0.04) !important;
      }
      html.light .bg-white\/10,
      html.light .hover\:bg-white\/10:hover,
      html.light .bg-white\/\[0\.07\],
      html.light .hover\:bg-white\/\[0\.07\]:hover {
        background-color: rgba(15, 23, 42, 0.07) !important;
      }
      html.light .border-white\/10,
      html.light .border-white\/15,
      html.light .border-white\/5 {
        border-color: rgba(15, 23, 42, 0.1) !important;
      }
      html.light .ring-white\/10 {
        --tw-ring-color: rgba(15, 23, 42, 0.1) !important;
      }
      html.light .divide-white\/5 > * + * {
        border-color: rgba(15, 23, 42, 0.08) !important;
      }

      /* ネオンのグラデーション枠線 */
      .neon-border {
        position: relative;
      }
      .neon-border::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.6), rgba(167, 139, 250, 0.6));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .text-gradient {
        background: linear-gradient(120deg, #22d3ee, #38bdf8 40%, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .glow-cyan {
        box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35), 0 8px 30px -8px rgba(34, 211, 238, 0.5);
      }

      /* スクロールバー */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(34, 211, 238, 0.4), rgba(167, 139, 250, 0.4));
        border-radius: 9999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(34, 211, 238, 0.7), rgba(167, 139, 250, 0.7));
        background-clip: padding-box;
      }

      ::selection {
        background: rgba(34, 211, 238, 0.3);
      }
    </style>
    <script>
      // 描画前に保存済みテーマを適用してちらつきを防ぐ
      (function () {
        try {
          var t = localStorage.getItem('chocopass-theme') === 'light' ? 'light' : 'dark';
          document.documentElement.classList.add(t);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
